<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký khách hàng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="client-page">
<div th:replace="~{client/fragments :: nav}"></div>
<main class="client-section auth-wrap">
    <div class="client-card auth-card">
        <h1>Đăng ký</h1>
        <div class="alert" th:if="${error}" th:text="${error}"></div>
        <form method="post" action="/dang-ky">
            <div class="form-row">
                <label>Họ tên</label>
                <input name="hoTen" th:value="${hoTen}" required>
            </div>
            <div class="form-row">
                <label>Email</label>
                <input type="email" name="email" th:value="${email}" required>
            </div>
            <div class="form-row">
                <label>Điện thoại</label>
                <input name="dienThoai" th:value="${dienThoai}" required>
            </div>
            <div class="form-row">
                <label>Địa chỉ</label>
                <input name="diaChi" th:value="${diaChi}">
            </div>
            <div class="form-row">
                <label>Mật khẩu</label>
                <input type="password" name="matKhau" required>
            </div>
            <button class="btn" type="submit">Đăng ký</button>
            <a class="btn secondary" href="/dang-nhap">Đăng nhập</a>
        </form>
    </div>
</main>
<div th:replace="~{client/fragments :: footer}"></div>
</body>
</html>
