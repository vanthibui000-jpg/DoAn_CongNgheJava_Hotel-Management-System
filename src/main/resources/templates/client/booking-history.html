<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đặt phòng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="client-page">
<div th:replace="~{client/fragments :: nav}"></div>
<main class="client-section">
    <div class="client-card">
        <h1>Lịch sử đặt phòng</h1>
        <div class="alert success" th:if="${message}" th:text="${message}"></div>
        <div class="alert" th:if="${error}" th:text="${error}"></div>
        <table class="table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Phòng</th>
                <th>Ngày nhận</th>
                <th>Ngày trả</th>
                <th>Số đêm</th>
                <th>Tạm tính</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td><span class="code-badge" th:text="${item.maCtDatPhong}"></span></td>
                <td th:text="${item.phong != null ? item.phong.maPhong : ''}"></td>
                <td th:text="${item.ngayNhan}"></td>
                <td th:text="${item.ngayTra}"></td>
                <td th:text="${item.soDem}"></td>
                <td class="price-cell" th:text="${item.tongTienPhong != null ? #numbers.formatInteger(item.tongTienPhong, 0, 'POINT') : ''}"></td>
                <td><span class="status-badge" th:text="${item.trangThaiHienThi}"></span></td>
                <td class="table-actions">
                    <a class="btn small" th:href="@{/tai-khoan/lich-su-dat-phong/{id}(id=${item.maCtDatPhong})}">Chi tiết</a>
                    <a class="btn small"
                       th:if="${item.coTheThanhToan}"
                       th:href="@{/tai-khoan/thanh-toan/{id}(id=${item.maCtDatPhong})}">Thanh toán</a>
                    <form method="post"
                          th:if="${item.coTheHuy}"
                          th:action="@{/tai-khoan/lich-su-dat-phong/huy/{id}(id=${item.maCtDatPhong})}"
                          onsubmit="return confirm('Bạn có chắc muốn hủy đơn đặt phòng này?')"
                          style="display:inline">
                        <button class="btn small danger" type="submit">Hủy</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="8" class="empty-row">Bạn chưa có đặt phòng nào.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{client/fragments :: footer}"></div>
</body>
</html>
