<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn chi tiết</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="client-page">
<div class="print-hidden" th:replace="~{client/fragments :: nav}"></div>
<main class="client-section">
    <div class="section-heading print-hidden">
        <h1>Hóa đơn chi tiết</h1>
        <div class="table-actions">
            <a class="btn secondary" th:href="@{/tai-khoan/lich-su-dat-phong/{id}(id=${datPhong.maCtDatPhong})}">Quay lại</a>
            <button class="btn" type="button" onclick="window.print()">In / Lưu PDF</button>
        </div>
    </div>
    <div class="alert success print-hidden" th:if="${message}" th:text="${message}"></div>

    <section class="client-card invoice-sheet">
        <div class="invoice-header">
            <div>
                <p class="eyebrow">Khách sạn Vip</p>
                <h1>Hóa đơn</h1>
                <p>Hotline: 0909 123 456</p>
            </div>
            <div class="invoice-code">
                <span>Mã hóa đơn</span>
                <strong>#<span th:text="${hoaDon.maHoaDon}"></span></strong>
            </div>
        </div>

        <div class="invoice-summary-grid">
            <div>
                <h2>Khách hàng</h2>
                <p><strong th:text="${khachHang.hoTen}"></strong></p>
                <p th:text="${khachHang.email}"></p>
                <p th:text="${khachHang.dienThoai}"></p>
            </div>
            <div>
                <h2>Đặt phòng</h2>
                <p>Mã đặt phòng: <strong th:text="${datPhong.maCtDatPhong}"></strong></p>
                <p>Phòng: <strong th:text="${datPhong.phong != null ? datPhong.phong.maPhong : ''}"></strong></p>
                <p>Ngày nhận: <strong th:text="${datPhong.ngayNhan}"></strong></p>
                <p>Ngày trả: <strong th:text="${datPhong.ngayTra}"></strong></p>
            </div>
            <div>
                <h2>Thanh toán</h2>
                <p>Ngày thu: <strong th:text="${hoaDon.ngayThuTien}"></strong></p>
                <p>Trạng thái:
                    <strong th:text="${hoaDon.trangThai == 'DA_THANH_TOAN' ? 'Đã thanh toán' : 'Chưa thanh toán'}"></strong>
                </p>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Nội dung</th>
                <th>Số lượng</th>
                <th>Đơn giá</th>
                <th>Thành tiền</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td th:text="${datPhong.phong != null ? 'Tiền phòng ' + datPhong.phong.maPhong : 'Tiền phòng'}"></td>
                <td th:text="${datPhong.soDem + ' đêm'}"></td>
                <td th:text="${datPhong.phong != null && datPhong.phong.loaiPhong != null && datPhong.phong.loaiPhong.giaPhong != null ? #numbers.formatInteger(datPhong.phong.loaiPhong.giaPhong, 0, 'POINT') + ' VNĐ' : '0 VNĐ'}"></td>
                <td class="price-cell" th:text="${#numbers.formatInteger(tienPhong, 0, 'POINT') + ' VNĐ'}"></td>
            </tr>
            <tr th:each="dv : ${dichVuDaDung}">
                <td th:text="${dv.dichVu != null ? dv.dichVu.tenDichVuHienThi : 'Dịch vụ'}"></td>
                <td th:text="${dv.soLuong}"></td>
                <td th:text="${dv.dichVu != null && dv.dichVu.giaDichVu != null ? #numbers.formatInteger(dv.dichVu.giaDichVu, 0, 'POINT') + ' VNĐ' : '0 VNĐ'}"></td>
                <td class="price-cell" th:text="${dv.tongTienDichVu != null ? #numbers.formatInteger(dv.tongTienDichVu, 0, 'POINT') + ' VNĐ' : '0 VNĐ'}"></td>
            </tr>
            </tbody>
        </table>

        <table class="table compact-table total-table invoice-total">
            <tbody>
            <tr><th>Tiền phòng</th><td th:text="${#numbers.formatInteger(tienPhong, 0, 'POINT') + ' VNĐ'}"></td></tr>
            <tr><th>Tiền dịch vụ</th><td th:text="${#numbers.formatInteger(tongTienDichVu, 0, 'POINT') + ' VNĐ'}"></td></tr>
            <tr class="total-row"><th>Tổng cộng</th><td th:text="${#numbers.formatInteger(tongCong, 0, 'POINT') + ' VNĐ'}"></td></tr>
            </tbody>
        </table>
    </section>
</main>
<div class="print-hidden" th:replace="~{client/fragments :: footer}"></div>
</body>
</html>
