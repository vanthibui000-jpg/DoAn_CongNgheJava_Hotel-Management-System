<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="client-page">
<div th:replace="~{client/fragments :: nav}"></div>
<main class="client-section auth-wrap">
    <div class="client-card auth-card">
        <h1>Đổi mật khẩu</h1>
        <div class="alert" th:if="${error}" th:text="${error}"></div>
        <div class="alert success" th:if="${success}" th:text="${success}"></div>
        <form class="form-stack" method="post" action="/tai-khoan/doi-mat-khau">
            <div class="form-row">
                <label>Mật khẩu cũ</label>
                <input type="password" name="matKhauCu" required>
            </div>
            <div class="form-row">
                <label>Mật khẩu mới</label>
                <input type="password" name="matKhauMoi" minlength="3" required>
            </div>
            <div class="form-row">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="xacNhanMatKhau" minlength="3" required>
            </div>
            <button class="btn" type="submit">Đổi mật khẩu</button>
            <a class="btn secondary" href="/tai-khoan">Quay lại tài khoản</a>
        </form>
    </div>
</main>
<div th:replace="~{client/fragments :: footer}"></div>
</body>
</html>
