<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm dịch vụ vào đơn</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
    <h1>Thêm dịch vụ vào đơn #<span th:text="${datPhong.maCtDatPhong}"></span></h1>
    <div class="card">
        <form method="post" action="/admin/ct-dich-vu/luu-vao-don">
            <input type="hidden" name="maCtDatPhong" th:value="${datPhong.maCtDatPhong}">
            <div class="form-row">
                <label>Dịch vụ</label>
                <select name="maDichVu" required>
                    <option value="">-- Chọn dịch vụ --</option>
                    <option th:each="dv : ${dichVus}"
                            th:value="${dv.maDichVu}"
                            th:text="${dv.tenDichVuHienThi + ' - ' + #numbers.formatInteger(dv.giaDichVu, 0, 'POINT') + ' VNĐ'}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>Số lượng</label>
                <input type="number" name="soLuong" min="1" value="1" required>
            </div>
            <button class="btn" type="submit">Thêm dịch vụ</button>
            <a class="btn secondary" th:href="@{/admin/dat-phong/chi-tiet/{id}(id=${datPhong.maCtDatPhong})}">Quay lại</a>
        </form>
    </div>
</div>

</body>
</html>
