<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container admin-wide">
    <h1>Quản lý khách hàng</h1>

    <div class="card admin-panel">
        <div class="admin-toolbar">
            <form class="toolbar-filter customer-filter" method="get" action="/admin/khach-hang">
                <div class="form-row">
                    <label>Tìm theo</label>
                    <select name="searchType" class="search-type-select">
                        <option value="ten" th:selected="${searchType == null or searchType == 'ten'}">Theo tên</option>
                        <option value="cmnd" th:selected="${searchType == 'cmnd'}">Theo CMND/CCCD</option>
                        <option value="sdt" th:selected="${searchType == 'sdt'}">Theo số điện thoại</option>
                    </select>
                </div>

                <div class="form-row">
                    <label>Từ khóa</label>
                    <input type="text"
                           name="keyword"
                           placeholder="Nhập từ khóa tìm kiếm"
                           th:value="${keyword}">
                </div>

                <div class="filter-actions">
                    <button class="btn" type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Tìm kiếm
                    </button>
                    <a class="btn secondary" href="/admin/khach-hang">
                        <i class="fa-solid fa-rotate-right"></i>
                        Làm mới
                    </a>
                </div>
            </form>

            <a class="btn" href="/admin/khach-hang/them">
                <i class="fa-solid fa-user-plus"></i>
                Thêm khách hàng
            </a>
        </div>

        <table class="table admin-table customer-table">
            <thead>
            <tr>
                <th>Mã</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Địa chỉ</th>
                <th>Điện thoại</th>
                <th>CMND</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td><span class="id-badge" th:text="${item.maKhachHang}">1</span></td>
                <td th:text="${item.hoTen}">Lê Văn Tèo</td>
                <td th:text="${item.email}">teo@gmail.com</td>
                <td th:text="${item.diaChi}">Hà Nội</td>
                <td th:text="${item.dienThoai}">0912345678</td>
                <td th:text="${item.cmnd}">258963147</td>
                <td class="table-actions customer-actions">
                    <a class="btn small" th:href="@{/admin/khach-hang/lich-su/{id}(id=${item.maKhachHang})}">
                        Chi tiết
                    </a>
                    <a class="btn small secondary" th:href="@{/admin/khach-hang/sua/{id}(id=${item.maKhachHang})}">
                        Sửa
                    </a>
                    <a class="btn small danger"
                       th:href="@{/admin/khach-hang/xoa/{id}(id=${item.maKhachHang})}"
                       onclick="return confirm('Xóa khách hàng này?')">
                        Xóa
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="7" class="empty-row">Không tìm thấy khách hàng phù hợp</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
